<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b0b0c">
<title>Build Tracker — Public Page</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Oswald:wght@700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070707;--panel:#131211;--cream:#f5f0e7;--muted:#b9b0a0;
  --gold:#b98a27;--gold-light:#f1d17a;--gold-dark:#6f4f12;
  --chrome:#d8d8d6;--line:rgba(241,209,122,.18);--green:#86efac;
  --red:#fca5a5;--blue:#93c5fd;--orange:#fdba74;
}
body{
  font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;
  background:radial-gradient(circle at 20% -10%,rgba(185,138,39,.22),transparent 38%),linear-gradient(135deg,#050505,#11100f 52%,#070707);
  color:var(--cream);
  min-height:100vh;
}
.public-wrap{max-width:1220px;margin:0 auto;padding:18px}
.public-hero{
  border-radius:28px;border:1px solid var(--line);
  background:linear-gradient(135deg,rgba(185,138,39,.18),rgba(216,216,214,.045)),linear-gradient(180deg,#1a1711,#0a0a0a);
  padding:24px;box-shadow:0 28px 90px rgba(0,0,0,.42);overflow:hidden;position:relative;margin-bottom:16px;
}
.public-hero:before{
  content:'BUILD STORY';position:absolute;right:22px;bottom:-8px;font-family:Oswald,sans-serif;font-size:82px;line-height:.85;
  letter-spacing:.08em;color:rgba(241,209,122,.055);pointer-events:none;
}
.public-logo-wrap{position:relative;z-index:2;margin-bottom:16px;display:flex;align-items:center;justify-content:flex-start}
.public-logo{width:min(430px,100%);height:auto;display:block;filter:drop-shadow(0 16px 28px rgba(0,0,0,.46))}
.hero-inner{position:relative;z-index:1;display:grid;grid-template-columns:1fr;gap:18px;align-items:center}
.hero-title{font-family:Oswald,sans-serif;font-size:clamp(36px,6vw,68px);line-height:.92;letter-spacing:.035em;text-transform:uppercase}
.hero-sub{margin-top:10px;color:var(--muted);font-size:13px;font-weight:900;letter-spacing:.08em;text-transform:uppercase}
.hero-updated{margin-top:14px;color:var(--muted);font-size:11px;font-weight:850;letter-spacing:.06em;text-transform:uppercase}
.hero-img{
  border-radius:26px;border:1px solid rgba(241,209,122,.20);background:#080808;overflow:hidden;min-height:420px;
  display:flex;align-items:center;justify-content:center;box-shadow:0 20px 54px rgba(0,0,0,.32);
}
.hero-img img{width:100%;height:auto;display:block;object-fit:contain;max-height:760px}
.hero-empty{color:var(--muted);font-size:12px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;text-align:center;padding:48px}
.public-tabs{
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:0 0 16px;
}
.public-tab{
  min-height:56px;border-radius:18px;border:1px solid rgba(241,209,122,.22);
  background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.018));
  color:var(--cream);font-family:Oswald,sans-serif;font-size:20px;font-weight:700;
  letter-spacing:.045em;text-transform:uppercase;cursor:pointer;
}
.public-tab.active{
  background:linear-gradient(135deg,var(--gold-dark),var(--gold),var(--gold-light));
  color:#080808;border-color:var(--gold-light);
}
.public-panel{display:none}
.public-panel.active{display:block}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.kpi-card,.sections-card,.parts-card,.milestones-card{
  border-radius:24px;border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.018));
  box-shadow:0 14px 34px rgba(0,0,0,.22),inset 0 1px 0 rgba(255,255,255,.045);padding:18px;
}
.kpi-label,.section-label{
  color:var(--muted);font-size:11px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;
}
.kpi-value{font-family:Oswald,sans-serif;font-size:clamp(48px,7vw,82px);line-height:.9;color:var(--gold-light)}
.progress-track{height:16px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.07);overflow:hidden;margin-top:14px}
.progress-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--gold-dark),var(--gold),var(--gold-light))}
.card-title{font-family:Oswald,sans-serif;font-size:30px;line-height:1;letter-spacing:.04em;text-transform:uppercase;margin-bottom:14px}
.section-grid-public{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
.section-card-public{
  border-radius:20px;border:1px solid rgba(241,209,122,.14);background:rgba(0,0,0,.22);
  padding:14px;box-shadow:inset 0 1px 0 rgba(255,255,255,.035);
}
.section-name{font-family:Oswald,sans-serif;font-size:22px;line-height:1;letter-spacing:.035em;text-transform:uppercase;margin-bottom:10px}
.section-meta-public{display:flex;justify-content:space-between;gap:10px;color:var(--muted);font-size:10px;font-weight:900;letter-spacing:.06em;text-transform:uppercase}
.section-percent{font-family:Oswald,sans-serif;font-size:28px;color:var(--gold-light);margin-top:10px}
.parts-card{margin-top:16px}
.public-parts-list{display:grid;gap:9px}
.public-part{
  display:grid;grid-template-columns:minmax(0,1fr) auto;gap:10px;align-items:center;
  padding:12px;border-radius:16px;border:1px solid rgba(241,209,122,.12);background:rgba(0,0,0,.22);
}
.public-part-name{font-size:13px;font-weight:900;color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.public-part-meta{margin-top:5px;display:flex;flex-wrap:wrap;gap:6px}
.pub-pill{
  display:inline-flex;align-items:center;padding:5px 8px;border-radius:999px;
  font-size:10px;font-weight:900;letter-spacing:.05em;text-transform:uppercase;
  border:1px solid rgba(241,209,122,.16);background:rgba(255,255,255,.04);color:var(--muted);
}
.status-pill{color:#fff;border-color:transparent}
.s-need{background:#dc2626}.s-ordered{background:#d97706}.s-received{background:#2563eb}.s-installed{background:#16a34a}.s-na{background:#374151}
.milestone-list{display:grid;gap:16px}
.milestone{
  border-radius:24px;border:1px solid rgba(241,209,122,.14);background:rgba(0,0,0,.20);overflow:hidden;
}
.ms-head{padding:20px;border-bottom:1px solid rgba(241,209,122,.10);background:radial-gradient(circle at 90% 0%,rgba(241,209,122,.13),transparent 34%),linear-gradient(135deg,rgba(185,138,39,.12),rgba(216,216,214,.035))}
.ms-kicker{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.ms-pill{border-radius:999px;border:1px solid rgba(241,209,122,.18);background:rgba(0,0,0,.22);color:var(--muted);font-size:10px;font-weight:900;letter-spacing:.07em;text-transform:uppercase;padding:6px 9px}
.ms-title{font-family:Oswald,sans-serif;font-size:clamp(30px,5vw,54px);line-height:.95;letter-spacing:.035em;text-transform:uppercase}
.ms-body{padding:20px}
.ms-copy{white-space:pre-wrap;font-size:15px;line-height:1.65;font-weight:650;color:var(--cream)}
.ms-gallery{margin-top:18px;display:grid;grid-template-columns:repeat(12,1fr);gap:12px}
.ms-photo{grid-column:span 4;border-radius:18px;overflow:hidden;border:1px solid rgba(241,209,122,.14);background:#080808;aspect-ratio:4/3;cursor:pointer}
.ms-photo:first-child{grid-column:span 8;aspect-ratio:16/9}
.ms-photo img{width:100%;height:100%;object-fit:cover;display:block}
.empty{padding:32px;text-align:center;color:var(--muted);font-weight:900;letter-spacing:.07em;text-transform:uppercase}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9999;display:none;align-items:center;justify-content:center;padding:18px;backdrop-filter:blur(8px)}
.lightbox.open{display:flex}
.lightbox-inner{position:relative;width:min(1200px,100%);border-radius:22px;border:1px solid rgba(241,209,122,.24);background:#080808;overflow:hidden}
.lightbox img{display:block;width:100%;max-height:92vh;object-fit:contain}
.lightbox button{position:absolute;top:12px;right:12px;width:42px;height:42px;border-radius:999px;border:1px solid rgba(241,209,122,.28);background:rgba(0,0,0,.72);color:var(--cream);font-size:22px;cursor:pointer}
@media(max-width:820px){
  .kpi-grid{grid-template-columns:1fr}
  .hero-img{min-height:280px}
  .public-part{grid-template-columns:1fr}
  .ms-gallery{grid-template-columns:repeat(2,1fr)}
  .ms-photo,.ms-photo:first-child{grid-column:auto;aspect-ratio:4/3}
}
@media(max-width:520px){.public-tabs{grid-template-columns:1fr}.public-logo{width:100%}}

.public-section-list{display:grid;gap:10px}
.public-section-drop{
  border-radius:20px;border:1px solid rgba(241,209,122,.14);background:rgba(0,0,0,.20);overflow:hidden;
}
.public-section-toggle{
  width:100%;border:0;background:linear-gradient(135deg,rgba(185,138,39,.12),rgba(216,216,214,.035));
  color:var(--cream);display:grid;grid-template-columns:minmax(0,1fr) auto auto;gap:10px;align-items:center;
  padding:14px 16px;cursor:pointer;text-align:left;
}
.public-section-toggle:hover{background:rgba(185,138,39,.13)}
.public-section-toggle-title{font-family:Oswald,sans-serif;font-size:22px;line-height:1;letter-spacing:.035em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.public-section-toggle-meta{color:var(--muted);font-size:10px;font-weight:900;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
.public-section-toggle-icon{color:var(--gold-light);font-size:22px}
.public-section-drop-body{display:none;padding:12px}
.public-section-drop.open .public-section-drop-body{display:grid;gap:9px}
.public-section-drop.open .public-section-toggle-icon{transform:rotate(180deg)}
@media(max-width:620px){
  .public-tabs{grid-template-columns:1fr}
  .public-section-toggle{grid-template-columns:1fr auto}
  .public-section-toggle-meta{grid-column:1/-1}
}


/* ===== v86 public page sync with main app ===== */
:root{
  --gs-display:'Oswald',system-ui,sans-serif;
  --gs-tracking-tight:-0.018em;
}
body{margin:0}
.public-wrap{max-width:none;margin:0;padding:0}
.public-hero{
  border-radius:0!important;
  border-left:none!important;
  border-right:none!important;
  border-top:none!important;
  margin-bottom:18px!important;
  padding:22px 24px!important;
  box-shadow:0 10px 40px rgba(0,0,0,.28)!important;
}
.public-hero:before{display:none!important;content:none!important}
.public-logo{
  width:auto!important;
  height:78px!important;
  max-height:78px!important;
  max-width:min(340px,42vw)!important;
  object-fit:contain!important;
}
.public-logo-wrap{margin-bottom:14px!important}
.hero-title,.kpi-value,.card-title,.section-name,.section-percent,.ms-title,.public-section-toggle-title,.public-tab{
  font-family:var(--gs-display)!important;
  font-weight:700!important;
  letter-spacing:var(--gs-tracking-tight)!important;
}
.public-main{max-width:1220px;margin:0 auto;padding:0 18px 18px}
.public-tabs .public-tab{
  display:inline-flex!important;
  flex-direction:row!important;
  align-items:center!important;
  justify-content:center!important;
  gap:9px!important;
}
.public-tabs .public-tab i{
  display:inline-flex!important;
  align-items:center!important;
  justify-content:center!important;
  width:1.2em!important;
  font-size:1.15em!important;
  line-height:1!important;
  flex-shrink:0!important;
}
.public-tabs .public-tab .tab-label{line-height:1}
@media(max-width:900px){
  .public-logo{height:68px!important;max-height:68px!important}
}
@media(max-width:520px){
  .public-hero{padding:16px 14px!important}
  .public-main{padding:0 10px 10px}
}


/* ===== v109 public header + work log ===== */
.tracker-header{
  width:100%;
  margin:0 0 18px;
  border-bottom:1px solid rgba(241,209,122,.22);
  box-shadow:0 10px 40px rgba(0,0,0,.28);
  background:linear-gradient(135deg,rgba(197,155,53,.2),rgba(255,255,255,.04)),linear-gradient(180deg,#181512,#0f0f10);
}
.tracker-header .top-bar{
  display:flex;
  flex-direction:row;
  align-items:center;
  justify-content:center;
  text-align:left;
  gap:0;
  padding:22px 24px 18px;
}
.public-header-brand{
  display:flex;
  flex-direction:row;
  align-items:stretch;
  justify-content:center;
  gap:18px;
  width:auto;
  max-width:min(920px,100%);
}
.top-bar-brand{display:flex;align-items:center;justify-content:center;flex-shrink:0;width:auto;min-height:96px}
.gs-header-logo,.public-logo{
  width:auto!important;
  height:100%!important;
  max-height:128px!important;
  min-height:96px!important;
  max-width:min(400px,44vw)!important;
  object-fit:contain!important;
  filter:drop-shadow(0 16px 28px rgba(0,0,0,.46));
}
.public-build-display{
  min-width:0;flex:1;width:auto;text-align:left;
  display:flex;flex-direction:column;justify-content:center;
}
.public-build-name{
  font-family:var(--gs-display);font-size:clamp(28px,4vw,42px);line-height:1;letter-spacing:var(--gs-tracking-tight);
  text-transform:uppercase;color:var(--cream);
}
.public-vehicle-meta{
  margin-top:8px;
  font-family:var(--gs-display);
  font-size:clamp(15px,2.4vw,20px);
  line-height:1.15;
  font-weight:700;
  letter-spacing:.05em;
  text-transform:uppercase;
  color:var(--gold-light);
}
.public-build-sub{margin-top:8px;color:var(--muted);font-size:12px;font-weight:800;letter-spacing:.06em;text-transform:uppercase}
.public-build-updated{margin-top:6px;color:var(--muted);font-size:11px;font-weight:750;letter-spacing:.05em;text-transform:uppercase}
.tracker-nav{
  padding:0!important;
  background:linear-gradient(180deg,rgba(0,0,0,.52),rgba(0,0,0,.34))!important;
  border-top:1px solid rgba(241,209,122,.28)!important;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.05)!important;
}
.tracker-nav-inner{display:flex;align-items:center;justify-content:center;gap:12px;padding:10px 16px 12px;max-width:1320px;margin:0 auto}
.tracker-nav-items{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;min-width:0}
.tracker-nav .tabs{
  display:flex!important;flex:0 1 auto;min-width:0;flex-wrap:wrap!important;align-items:center!important;justify-content:center!important;gap:10px!important;
  margin:0 auto!important;overflow-x:auto!important;-webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.tracker-nav .tabs::-webkit-scrollbar{display:none}
.tracker-nav .tab{
  flex:0 0 auto!important;min-height:42px!important;padding:9px 14px!important;
  display:inline-flex!important;align-items:center!important;justify-content:center!important;gap:8px!important;
  font-family:var(--gs-display)!important;font-size:14px!important;font-weight:700!important;
  letter-spacing:var(--gs-tracking-tight)!important;text-transform:uppercase;
  border-radius:12px!important;border:1px solid rgba(241,209,122,.16)!important;
  background:rgba(255,255,255,.04)!important;color:var(--cream)!important;cursor:pointer;
}
.tracker-nav .tab:hover{background:rgba(255,255,255,.08)!important;border-color:rgba(241,209,122,.32)!important}
.tracker-nav .tab.active{
  color:#fff!important;
  background:linear-gradient(180deg,rgba(197,155,53,.34),rgba(0,0,0,.22))!important;
  border-color:rgba(241,209,122,.55)!important;
  box-shadow:0 0 0 1px rgba(241,209,122,.12)!important;
}
.tracker-nav .tab i{font-size:15px;line-height:1}
.public-main{max-width:1220px;margin:0 auto;padding:0 18px 24px}

.public-hero-img{
  border-radius:22px;border:1px solid rgba(241,209,122,.2);background:#080808;overflow:hidden;
  min-height:280px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;
  box-shadow:0 20px 54px rgba(0,0,0,.32);
}
.public-hero-img img{width:100%;height:auto;display:block;object-fit:contain;max-height:640px}
.pub-stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
.pub-stat{
  border-radius:18px;border:1px solid rgba(241,209,122,.16);
  background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.02));
  padding:14px 16px;box-shadow:0 10px 24px rgba(0,0,0,.18);
}
.pub-stat label{display:block;font-size:10px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.pub-stat .val{font-family:var(--gs-display);font-size:clamp(24px,3vw,34px);line-height:1;font-weight:700;color:var(--cream)}
.pub-stat .val.gold{color:var(--gold-light)}
.pub-stat .val.green{color:#86efac}
.pub-stat .val.muted{color:var(--cream)}
.pub-wl-board{display:flex;gap:12px;overflow-x:auto;padding-bottom:10px;-webkit-overflow-scrolling:touch}
.pub-wl-col{
  flex:0 0 280px;min-width:280px;display:flex;flex-direction:column;gap:8px;
  padding:12px;border-radius:16px;border:1px solid rgba(241,209,122,.16);
  background:rgba(0,0,0,.22);max-height:70vh;
}
.pub-wl-col-hdr{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:4px}
.pub-wl-col-title{font-family:var(--gs-display);font-size:15px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--cream)}
.pub-wl-col-count{
  min-width:24px;height:24px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:900;background:rgba(255,255,255,.08);color:var(--muted);
}
.pub-wl-col-body{display:flex;flex-direction:column;gap:8px;overflow-y:auto;min-height:40px}
.pub-col-backlog{border-color:rgba(255,255,255,.14)}
.pub-col-ready{border-color:rgba(96,165,250,.28);background:rgba(29,78,216,.08)}
.pub-col-progress{border-color:rgba(251,191,36,.28);background:rgba(217,119,6,.08)}
.pub-col-hold{border-color:rgba(248,113,113,.24);background:rgba(220,38,38,.06)}
.pub-col-done{border-color:rgba(74,222,128,.28);background:rgba(21,128,61,.08)}
.pub-wl-card{
  border-radius:12px;border:1px solid rgba(241,209,122,.16);
  background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(0,0,0,.2));
  padding:10px;box-shadow:0 6px 16px rgba(0,0,0,.16);
}
.pub-wl-card-title{font-size:14px;font-weight:800;color:var(--cream);line-height:1.3;word-break:break-word;margin-bottom:8px}
.pub-wl-card-meta{display:flex;flex-wrap:wrap;gap:5px}
.pub-wl-parts{margin-top:8px;padding-top:8px;border-top:1px solid rgba(241,209,122,.1)}
.pub-wl-parts-hdr{font-size:9px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:var(--gold-light);margin-bottom:5px}
.pub-wl-part{
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  padding:4px 6px;border-radius:8px;border:1px solid rgba(241,209,122,.1);background:rgba(0,0,0,.2);margin-bottom:4px;
}
.pub-wl-part:last-child{margin-bottom:0}
.pub-wl-part-left{min-width:0;flex:1}
.pub-wl-part-name{font-size:10px;font-weight:800;color:var(--cream);line-height:1.2;word-break:break-word}
.pub-wl-part-sec{margin-top:1px;font-size:8px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:var(--muted)}
.pub-wl-part-meta{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0}
.pub-wl-part-meta .pub-pill{padding:1px 4px;font-size:6px}
.pub-wl-notes{
  margin-top:8px;font-size:11px;line-height:1.45;color:var(--muted);white-space:pre-wrap;
  border-top:1px dashed rgba(241,209,122,.12);padding-top:8px;
}
.prio-critical{color:#fecaca;border-color:rgba(248,113,113,.35)!important}
.prio-high{color:#fde68a;border-color:rgba(251,191,36,.35)!important}
.prio-medium{color:#bfdbfe;border-color:rgba(96,165,250,.3)!important}
.prio-low{color:var(--muted)}
@media(max-width:900px){
  .public-header-brand{gap:12px;max-width:100%}
  .top-bar-brand{min-height:84px}
  .gs-header-logo,.public-logo{max-height:112px!important;min-height:84px!important;max-width:min(260px,40vw)!important}
  .public-build-name{font-size:clamp(22px,5vw,32px)}
}
@media(max-width:520px){
  .tracker-header .top-bar{padding:16px 14px 14px}
  .public-header-brand{gap:10px}
}

.pub-dash-progress{
  margin-bottom:16px;
  padding:18px;
  border-radius:24px;
  border:1px solid var(--line);
  background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.018));
  box-shadow:0 14px 34px rgba(0,0,0,.22),inset 0 1px 0 rgba(255,255,255,.045);
}
.pub-dash-progress .card-title{margin-bottom:10px}
.pub-dash-progress-row{
  display:flex;
  align-items:baseline;
  justify-content:flex-end;
  margin-bottom:10px;
}
.pub-dash-kpi-val{font-family:var(--gs-display);font-size:clamp(32px,5vw,42px);line-height:1;color:var(--gold-light)}
.pub-dash-bar{height:16px;margin:0 0 8px}
.pub-dash-sub{font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
.pub-news{
  margin-bottom:16px;
  padding:16px;
  border-radius:22px;
  border:1px solid rgba(241,209,122,.16);
  background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.02));
  box-shadow:0 12px 26px rgba(0,0,0,.16);
}
.pub-news-hdr{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:14px;
}
.pub-news-hdr .card-title{margin:0;flex:1;min-width:0}
.pub-news-more{
  border-radius:999px;border:1px solid rgba(241,209,122,.35);background:rgba(197,155,53,.14);
  color:var(--gold-light);font-size:10px;font-weight:900;letter-spacing:.07em;text-transform:uppercase;
  padding:7px 12px;cursor:pointer;
}
.pub-news-more:hover{border-color:rgba(241,209,122,.55);background:rgba(197,155,53,.26)}
.pub-news-list{display:grid;gap:12px}
.pub-news-card{
  display:grid;grid-template-columns:120px minmax(0,1fr);gap:12px;
  padding:10px;border-radius:16px;border:1px solid rgba(241,209,122,.14);
  background:rgba(0,0,0,.22);overflow:hidden;
}
.pub-news-thumb{
  border-radius:12px;overflow:hidden;border:1px solid rgba(241,209,122,.12);
  background:#080808;aspect-ratio:4/3;min-height:84px;
}
.pub-news-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.pub-news-thumb-empty{
  width:100%;height:100%;min-height:84px;display:flex;align-items:center;justify-content:center;
  color:var(--muted);font-size:9px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;text-align:center;padding:8px;
}
.pub-news-body{min-width:0;display:flex;flex-direction:column;gap:6px}
.pub-news-meta{display:flex;flex-wrap:wrap;gap:6px}
.pub-news-date,.pub-news-tag{
  font-size:9px;font-weight:900;letter-spacing:.06em;text-transform:uppercase;
  padding:4px 7px;border-radius:999px;border:1px solid rgba(241,209,122,.16);color:var(--muted);background:rgba(255,255,255,.04);
}
.pub-news-headline{
  font-family:var(--gs-display);font-size:17px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;
  color:var(--cream);line-height:1.15;
}
.pub-news-excerpt{font-size:13px;line-height:1.5;color:var(--muted);margin-top:2px}
.pub-news-read{
  align-self:flex-start;
  margin-top:4px;
  border:0;
  background:transparent;
  color:var(--gold-light);
  font-size:10px;
  font-weight:900;
  letter-spacing:.07em;
  text-transform:uppercase;
  cursor:pointer;
  padding:0;
}
.pub-news-read:hover{color:#fff;text-decoration:underline}
.pub-sec-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:10px;
}
.pub-sec-item{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px 14px;
  border-radius:16px;
  border:1px solid rgba(241,209,122,.14);
  background:rgba(0,0,0,.22);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
  min-width:0;
}
.pub-sec-item:last-child:nth-child(odd){grid-column:1/-1}
.pub-sec-ring-sm{width:56px;height:56px;position:relative;flex-shrink:0}
.pub-sec-ring-sm svg{width:100%;height:100%;transform:rotate(-90deg)}
.pub-sec-ring-track{fill:none;stroke:rgba(255,255,255,.1);stroke-width:7}
.pub-sec-ring-fill{fill:none;stroke:#c59b35;stroke-width:7;stroke-linecap:round}
.pub-sec-ring-pct{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:var(--gs-display);font-size:12px;font-weight:700;color:var(--gold-light);
}
.pub-sec-item-body{flex:1;min-width:0}
.pub-sec-item-top{
  display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:6px;
}
.pub-sec-item-name{
  font-family:var(--gs-display);font-size:15px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;
  color:var(--cream);line-height:1.15;min-width:0;word-break:break-word;
}
.pub-sec-item-pct{
  font-family:var(--gs-display);font-size:18px;font-weight:700;color:var(--gold-light);flex-shrink:0;
}
.pub-sec-item-bar{height:8px;margin:0}
.pub-sec-item-meta{
  margin-top:5px;font-size:9px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);
}
@media(max-width:700px){
  .pub-sec-grid{grid-template-columns:1fr}
  .pub-sec-item:last-child:nth-child(odd){grid-column:auto}
  .pub-news-card{grid-template-columns:1fr}
  .pub-news-thumb{aspect-ratio:16/9;max-height:160px}
}

@media(max-width:760px){
  .tracker-nav-inner{padding:8px 10px 10px}
  .public-main{padding:0 12px 18px}
}

</style>
</head>

function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function fmtDate(iso){try{return new Date(iso).toLocaleDateString('en-CA',{year:'numeric',month:'short',day:'numeric'})}catch(e){return iso||''}}
function sectionName(data,key){const s=(data.sections||[]).find(x=>x.key===key);return s?s.name:''}

function showPublicPanel(name,push=true,scrollTop=false){
  if(!['dashboard','buildlist','worklog','milestones'].includes(name))name='dashboard';
  document.querySelectorAll('.public-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab[data-public-tab]').forEach(t=>t.classList.remove('active'));
  const panel=document.getElementById('public-'+name);
  const tab=document.querySelector(`[data-public-tab="${name}"]`);
  if(panel)panel.classList.add('active');
  if(tab)tab.classList.add('active');
  if(push&&window.location.hash!=='#'+name)history.pushState({publicPanel:name},'',window.location.pathname+window.location.search+'#'+name);
  if(scrollTop||name==='milestones'){
    window.scrollTo({top:0,left:0,behavior:'smooth'});
    const ms=document.getElementById('public-milestones');
    if(ms)ms.scrollTop=0;
  }
}
function publicPanelFromHash(){
  const h=(window.location.hash||'#dashboard').replace('#','').trim();
  return ['dashboard','buildlist','worklog','milestones'].includes(h)?h:'dashboard';
}
window.addEventListener('popstate',()=>showPublicPanel(publicPanelFromHash(),false));
window.addEventListener('hashchange',()=>showPublicPanel(publicPanelFromHash(),false));

function togglePublicSection(btn){
  const card=btn.closest('.public-section-drop');
  if(card)card.classList.toggle('open');
}

function statusClass(status){
  return {'Need to Buy':'s-need','Ordered':'s-ordered','Received':'s-received','Installed':'s-installed','N/A':'s-na'}[status]||'s-na';
}

function priorityRank(p){
  return {'Critical':0,'High':1,'Medium':2,'Low':3}[p]??9;
}

function openLightbox(src){const lb=document.getElementById('lightbox'),img=document.getElementById('lightbox-img');img.src=src;lb.classList.add('open');document.body.style.overflow='hidden'}
function closeLightbox(){const lb=document.getElementById('lightbox'),img=document.getElementById('lightbox-img');lb.classList.remove('open');img.src='';document.body.style.overflow=''}
window.addEventListener('keydown',e=>{if(e.key==='Escape')closeLightbox()});


const PUB_WK_ORDER=['Backlog','Ready to Begin','In Progress','On Hold','Done'];
const PUB_WK_LABEL={'Backlog':'Not Ready','Ready to Begin':'Ready to Begin','In Progress':'In Progress','On Hold':'On Hold','Done':'Done'};
const PUB_WK_COL={'Backlog':'pub-col-backlog','Ready to Begin':'pub-col-ready','In Progress':'pub-col-progress','On Hold':'pub-col-hold','Done':'pub-col-done'};
function prioClass(p){return {'Critical':'prio-critical','High':'prio-high','Medium':'prio-medium','Low':'prio-low'}[p]||'prio-medium'}

function buildPublicWorkLogCard(task){
  const parts=(task.linkedParts||[]).map(p=>`<div class="pub-wl-part">
    <div class="pub-wl-part-left">
      <div class="pub-wl-part-name">${esc(p.name||'Part')}</div>
      <div class="pub-wl-part-sec">${esc(p.sectionName||'')}</div>
    </div>
    <div class="pub-wl-part-meta">
      <span class="pub-pill status-pill ${statusClass(p.status)}">${esc(p.status||'Need to Buy')}</span>
      <span class="pub-pill ${prioClass(p.priority)}">${esc(p.priority||'Medium')}</span>
    </div>
  </div>`).join('');
  const meta=[
    `<span class="pub-pill ${prioClass(task.priority)}">${esc(task.priority||'Medium')}</span>`,
    task.sectionName?`<span class="pub-pill">${esc(task.sectionName)}</span>`:'',
    (parseFloat(task.hoursTotal)||0)?`<span class="pub-pill"><i class="ti ti-clock"></i>${(parseFloat(task.hoursTotal)||0).toFixed(1)} hrs</span>`:''
  ].filter(Boolean).join('');
  return `<article class="pub-wl-card">
    <div class="pub-wl-card-title">${esc(task.title||'Untitled task')}</div>
    <div class="pub-wl-card-meta">${meta}</div>
    ${parts?`<div class="pub-wl-parts"><div class="pub-wl-parts-hdr">Linked parts (${(task.linkedParts||[]).length})</div>${parts}</div>`:''}
    ${task.notes?`<div class="pub-wl-notes">${esc(task.notes)}</div>`:''}
  </article>`;
}


function ringSvg(pct,size,trackW,fillClass){
  const p=Math.max(0,Math.min(100,parseFloat(pct)||0));
  const r=(size-trackW)/2;
  const c=2*Math.PI*r;
  const off=c*(1-p/100);
  return `<svg viewBox="0 0 ${size} ${size}" aria-hidden="true">
    <circle class="${fillClass}-track" cx="${size/2}" cy="${size/2}" r="${r}"></circle>
    <circle class="${fillClass}-fill" cx="${size/2}" cy="${size/2}" r="${r}" stroke-dasharray="${c}" stroke-dashoffset="${off}"></circle>
  </svg><div class="${fillClass}-pct">${Math.round(p)}%</div>`;
}

function firstLineExcerpt(text,maxLen){
  const line=String(text||'').trim().split(/\r?\n/).map(l=>l.trim()).find(l=>l.length);
  if(!line)return'';
  return line.length>maxLen?line.slice(0,maxLen).trim()+'…':line;
}

function renderPublicNews(milestones){
  const el=document.getElementById('pub-news');
  if(!el)return;
  const list=(milestones||[]).slice().sort((a,b)=>String(b.date||'').localeCompare(String(a.date||''))).slice(0,3);
  if(!list.length){el.innerHTML='<div class="empty" style="padding:20px 10px">No milestone posts published yet.</div>';return;}
  el.innerHTML=`<div class="pub-news-hdr">
      <div class="card-title">Latest From the Build</div>
      <button class="pub-news-more" type="button" onclick="showPublicPanel('milestones',true,true)">View all</button>
    </div>
    <div class="pub-news-list">${list.map(m=>{
      const photos=Array.isArray(m.photos)?m.photos:[];
      const thumb=photos[0]
        ?`<div class="pub-news-thumb"><img src="${photos[0]}" alt="${esc(m.title||'Milestone')}" loading="lazy"></div>`
        :`<div class="pub-news-thumb"><div class="pub-news-thumb-empty">No image</div></div>`;
      const excerpt=firstLineExcerpt(m.body,200);
      const sec=m.relatedSection?sectionName(window.__pubData||{},m.relatedSection):'';
      return `<article class="pub-news-card">${thumb}<div class="pub-news-body">
        <div class="pub-news-meta">
          ${m.date?`<span class="pub-news-date">${esc(fmtDate(m.date))}</span>`:''}
          ${m.status?`<span class="pub-news-tag">${esc(m.status)}</span>`:''}
          ${sec?`<span class="pub-news-tag">${esc(sec)}</span>`:''}
        </div>
        <div class="pub-news-headline">${esc(m.title||'Untitled Milestone')}</div>
        <div class="pub-news-excerpt">${excerpt?esc(excerpt):'No description published yet.'}</div>
        <button class="pub-news-read" type="button" onclick="showPublicPanel('milestones')">Read more</button>
      </div></article>`;
    }).join('')}</div>`;
}

function renderPublicWorkLog(wl){
  const statsEl=document.getElementById('public-worklog-stats');
  const boardEl=document.getElementById('public-worklog-board');
  if(!statsEl||!boardEl)return;
  const wlData=wl||{};
  const stats=wlData.stats||{};
  const tasks=Array.isArray(wlData.tasks)?wlData.tasks:[];
  statsEl.innerHTML=`
    <div class="pub-stat"><label>Open tasks</label><div class="val muted">${parseInt(stats.backlog||0)||0}</div></div>
    <div class="pub-stat"><label>Ready to begin</label><div class="val">${parseInt(stats.ready||0)||0}</div></div>
    <div class="pub-stat"><label>In progress</label><div class="val gold">${parseInt(stats.inProgress||0)||0}</div></div>
    <div class="pub-stat"><label>Hours logged</label><div class="val green">${(parseFloat(stats.hours||0)||0).toFixed(1)}</div></div>
    <div class="pub-stat"><label>Completed</label><div class="val green">${parseInt(stats.done||0)||0}</div></div>`;
  boardEl.innerHTML=PUB_WK_ORDER.map(status=>{
    const colTasks=tasks.filter(t=>t.status===status);
    const cards=colTasks.length?colTasks.map(buildPublicWorkLogCard).join(''):'<div class="empty" style="padding:14px 8px;font-size:10px">No tasks</div>';
    return `<div class="pub-wl-col ${PUB_WK_COL[status]||''}">
      <div class="pub-wl-col-hdr">
        <div class="pub-wl-col-title">${esc(PUB_WK_LABEL[status]||status)}</div>
        <div class="pub-wl-col-count">${colTasks.length}</div>
      </div>
      <div class="pub-wl-col-body">${cards}</div>
    </div>`;
  }).join('');
}


function renderPublicHero(data){
  const img=document.getElementById('hero-img');
  if(!img)return;
  const title=data.buildTitle||'My Build';
  img.innerHTML=data.vehicleImage?`<img src="${data.vehicleImage}" alt="${esc(title+' Preview')}">`:`<div class="hero-empty">No build image published yet.</div>`;
}

function formatPublicVehicleLabel(data){
  const y=String((data&&data.vehicleYear)||'').trim();
  const mk=String((data&&data.vehicleMake)||'').trim();
  const md=String((data&&data.vehicleModel)||'').trim();
  const parts=[];
  if(y)parts.push(y);
  if(mk)parts.push(mk);
  if(md)parts.push(md);
  const built=parts.join(' ');
  const saved=data&&data.vehicleLabel?String(data.vehicleLabel).trim():'';
  return built||saved;
}
function render(data){
  document.getElementById('build-title').textContent=data.buildTitle||'My Build';
  const vehicleMeta=document.getElementById('vehicle-meta');
  const vehicleLabel=formatPublicVehicleLabel(data);
  if(vehicleMeta){
    vehicleMeta.textContent=vehicleLabel;
    vehicleMeta.hidden=!vehicleLabel;
  }
  document.getElementById('build-subtitle').textContent=data.buildSubtitle||'The story behind the build.';
  document.getElementById('updated-at').textContent=data.updatedAt?'Last updated '+fmtDate(data.updatedAt):'';

  renderPublicHero(data);

  window.__pubData=data;
  const pct=parseInt(data.completion||0)||0;
  const overallText=document.getElementById('overall-completion-text');
  if(overallText)overallText.textContent=pct+'%';
  const bar=document.getElementById('overall-bar');
  if(bar)bar.style.width=Math.max(0,Math.min(100,pct))+'%';

  const sections=data.sections||[];
  document.getElementById('section-progress').innerHTML=sections.length?sections.map(sec=>{
    const sp=parseInt(sec.completion||0)||0;
    return `<div class="pub-sec-item">
      <div class="pub-sec-ring-sm">${ringSvg(sp,56,6,'pub-sec-ring')}</div>
      <div class="pub-sec-item-body">
        <div class="pub-sec-item-top">
          <div class="pub-sec-item-name">${esc(sec.name)}</div>
          <div class="pub-sec-item-pct">${sp}%</div>
        </div>
        <div class="progress-track pub-sec-item-bar"><div class="progress-fill" style="width:${Math.max(0,Math.min(100,sp))}%"></div></div>
        <div class="pub-sec-item-meta">${parseInt(sec.installed||0)||0} installed · ${parseInt(sec.totalParts||0)||0} parts</div>
      </div>
    </div>`;
  }).join(''):`<div class="empty">No section progress published yet.</div>`;

  const allParts=sections.flatMap(s=>(s.parts||[]).map(p=>({...p,sectionName:s.name})))
    .sort((a,b)=>priorityRank(a.priority)-priorityRank(b.priority)||String(a.sectionName).localeCompare(String(b.sectionName))||String(a.name).localeCompare(String(b.name)));

  const partsEl=document.getElementById('public-parts-list');
  if(partsEl){
    partsEl.innerHTML=sections.some(s=>(s.parts||[]).length)?sections.map((s,idx)=>{
      const parts=(s.parts||[]).slice().sort((a,b)=>priorityRank(a.priority)-priorityRank(b.priority)||String(a.name).localeCompare(String(b.name)));
      if(!parts.length)return '';
      return `<div class="public-section-drop">
        <button class="public-section-toggle" type="button" onclick="togglePublicSection(this)">
          <span class="public-section-toggle-title">${esc(s.name)}</span>
          <span class="public-section-toggle-meta">${parts.length} parts • ${parseInt(s.completion||0)||0}% complete</span>
          <i class="ti ti-chevron-down public-section-toggle-icon"></i>
        </button>
        <div class="public-section-drop-body">
          ${parts.map(p=>`<div class="public-part">
            <div>
              <div class="public-part-name">${esc(p.name||'Untitled part')}</div>
              <div class="public-part-meta">
                ${p.vendor?`<span class="pub-pill">${esc(p.vendor)}</span>`:''}
                <span class="pub-pill">${esc(p.priority||'Medium')}</span>
              </div>
            </div>
            <span class="pub-pill status-pill ${statusClass(p.status)}">${esc(p.status||'Need to Buy')}</span>
          </div>`).join('')}
        </div>
      </div>`;
    }).join(''):`<div class="empty">No build list published yet.</div>`;
  }

  const milestones=(data.milestones||[]).slice().sort((a,b)=>String(b.date||'').localeCompare(String(a.date||'')));
  renderPublicNews(milestones);
  document.getElementById('milestone-count').textContent=milestones.length;
  document.getElementById('milestone-list').innerHTML=milestones.length?milestones.map(m=>{
    const sec=sectionName(data,m.relatedSection);
    const photos=Array.isArray(m.photos)?m.photos:[];
    return `<article class="milestone">
      <div class="ms-head">
        <div class="ms-kicker">
          ${m.status?`<span class="ms-pill">${esc(m.status)}</span>`:''}
          ${m.date?`<span class="ms-pill">${esc(fmtDate(m.date))}</span>`:''}
          ${sec?`<span class="ms-pill">${esc(sec)}</span>`:''}
        </div>
        <div class="ms-title">${esc(m.title||'Untitled Milestone')}</div>
      </div>
      <div class="ms-body">
        <div class="ms-copy">${m.body?esc(m.body):''}</div>
        ${photos.length?`<div class="ms-gallery">${photos.map(src=>`<button class="ms-photo" type="button" onclick="openLightbox('${src}')"><img src="${src}" alt="Milestone image"></button>`).join('')}</div>`:''}
      </div>
    </article>`;
  }).join(''):`<div class="empty">No milestones published yet.</div>`;

  renderPublicWorkLog(data.workLog||{});
}

function showError(msg){document.getElementById('updated-at').textContent=msg}
async function init(){
  try{
    if(!firebase.apps.length)firebase.initializeApp(FIREBASE_CONFIG);
    db=firebase.firestore();
    docRef=db.collection(PUBLIC_COLLECTION).doc(PUBLIC_DOC);
    docRef.onSnapshot(snap=>{
      if(!snap.exists){showError('Public build data has not been published yet. Check Firestore rules and click Share Build in the private tracker.');return;}
      render(snap.data()||{});
    },err=>{console.warn(err);showError('Could not load public build data.')})
  }catch(e){console.warn(e);showError('Public page failed to initialize.')}
}
showPublicPanel(publicPanelFromHash(),false);
init();
</script>
</body>
</html>
