<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b0b0c">
<title>Gold Standard C10 Build Tracker</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
.tracker{padding:.75rem 0}
.top-bar{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;padding-bottom:.75rem;border-bottom:.5px solid var(--color-border-tertiary);flex-wrap:wrap}
.top-bar h1{font-size:16px;font-weight:500;color:var(--color-text-primary);flex:1;min-width:160px}
.save-indicator{font-size:11px;padding:3px 8px;border-radius:4px;background:var(--color-background-secondary);color:var(--color-text-secondary);border:.5px solid var(--color-border-tertiary);white-space:nowrap}
.save-indicator.saving{color:#8B6914;border-color:#D97706}
.save-indicator.saved{color:#15803D;border-color:#15803D}
.dl-btn{font-size:12px;padding:5px 10px;border:.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);cursor:pointer;background:var(--color-background-primary);color:var(--color-text-secondary);display:flex;align-items:center;gap:5px;white-space:nowrap}
.dl-btn:hover{background:var(--color-background-secondary)}
.tabs{display:flex;gap:3px;margin-bottom:1.25rem;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:6px 12px;font-size:13px;border:.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);cursor:pointer;background:var(--color-background-primary);color:var(--color-text-secondary);white-space:nowrap;transition:all .15s;flex-shrink:0}
.tab:hover{background:var(--color-background-secondary)}
.tab.active{background:#7a5c00;color:#fff;border-color:#7a5c00}
.panel{display:none}
.panel.active{display:block}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:1.25rem}
.stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px}
.stat label{font-size:11px;color:var(--color-text-secondary);display:block;margin-bottom:3px}
.stat .val{font-size:18px;font-weight:500;color:var(--color-text-primary)}
.stat .val.gold{color:#8B6914}
.stat .val.green{color:var(--color-text-success)}
.stat .val.muted{font-size:14px}
.prog-bar{background:var(--color-background-tertiary);border-radius:4px;height:5px;margin:5px 0 0;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;background:#8B6914;transition:width .3s}
.big-bar-wrap{margin-bottom:1.25rem}
.big-bar-wrap .bar-lbl{display:flex;justify-content:space-between;font-size:11px;color:var(--color-text-secondary);margin-bottom:3px}
.big-bar{height:8px;border-radius:4px;background:var(--color-background-secondary);overflow:hidden;margin-bottom:3px}
.big-bar-fill{height:100%;border-radius:4px;background:#8B6914}
.ss-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:7px;margin-bottom:1.25rem}
.ss-card{background:var(--color-background-primary);border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:9px 11px;cursor:pointer}
.ss-card:hover{border-color:var(--color-border-secondary);background:var(--color-background-secondary)}
.ss-card .ss-name{font-size:12px;font-weight:500;color:var(--color-text-primary);margin-bottom:4px}
.ss-card .ss-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px}
.ss-card .ss-spent{font-size:13px;font-weight:500;color:#8B6914}
.ss-card .ss-blbl{font-size:11px;color:var(--color-text-secondary)}
.ss-prog{height:3px;border-radius:2px;background:var(--color-background-secondary);overflow:hidden}
.ss-prog-fill{height:100%;border-radius:2px;background:#8B6914}
.section-grid{display:grid;grid-template-columns:1fr;gap:8px;margin-bottom:1.25rem}
.section-card{background:var(--color-background-primary);border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden}
.section-hdr{padding:9px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;background:var(--color-background-secondary);flex-wrap:wrap}
.section-hdr:hover{background:var(--color-background-tertiary)}
.section-title{font-size:14px;font-weight:500;color:var(--color-text-primary);flex:1;min-width:100px}
.section-meta{font-size:11px;color:var(--color-text-secondary);white-space:nowrap}
.budget-edit-wrap{display:inline-flex;align-items:center;gap:4px}
.budget-inp{width:78px;padding:3px 5px;font-size:11px;border:.5px solid #8B6914;border-radius:4px;background:var(--color-background-primary);color:var(--color-text-primary);text-align:right}
.budget-inp:focus{outline:none;box-shadow:0 0 0 2px rgba(139,105,20,.2)}
.sec-chev{font-size:15px;color:var(--color-text-secondary);transition:transform .2s;flex-shrink:0}
.sec-chev.open{transform:rotate(180deg)}
.sec-body{display:none}
.sec-body.open{display:block}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.parts-table{width:100%;border-collapse:collapse;font-size:12px}
.parts-table th{padding:6px 8px;text-align:left;font-weight:500;font-size:10px;color:var(--color-text-secondary);border-bottom:.5px solid var(--color-border-tertiary);white-space:nowrap;background:var(--color-background-secondary);text-transform:uppercase;letter-spacing:.03em}
.parts-table td{padding:5px 7px;border-bottom:.5px solid var(--color-border-tertiary);vertical-align:middle}
.parts-table tr:last-child td{border-bottom:none}
.parts-table tr:hover td{background:var(--color-background-secondary)}
.cost-inp{width:82px;padding:3px 5px;font-size:12px;border:.5px solid var(--color-border-secondary);border-radius:4px;background:var(--color-background-primary);color:var(--color-text-primary);text-align:right}
.cost-inp:focus{outline:none;border-color:#8B6914;box-shadow:0 0 0 2px rgba(139,105,20,.15)}
.link-inp{width:110px;padding:3px 5px;font-size:11px;border:.5px solid var(--color-border-secondary);border-radius:4px;background:var(--color-background-primary);color:var(--color-text-primary)}
.link-inp:focus{outline:none;border-color:#8B6914}
.inline-edit{border:none;background:transparent;font-size:12px;color:var(--color-text-primary);width:100%;padding:2px 0;cursor:text}
.inline-edit:hover{background:var(--color-background-secondary);border-radius:3px;padding:2px 3px}
.inline-edit:focus{outline:none;background:var(--color-background-secondary);border-radius:3px;padding:2px 3px;border-bottom:1px solid #8B6914}
.vendor-inp{width:100%;padding:3px 4px;font-size:11px;border:none;background:transparent;color:var(--color-text-secondary)}
.vendor-inp:focus{outline:none;border-bottom:1px solid #8B6914;background:var(--color-background-secondary)}
.note-inp{width:100%;padding:3px 5px;font-size:11px;border:.5px solid var(--color-border-secondary);border-radius:4px;background:var(--color-background-primary);color:var(--color-text-primary)}
.note-inp:focus{outline:none;border-color:#8B6914}
.p-badge{font-size:10px;padding:2px 4px;border-radius:3px;white-space:nowrap}
.p-critical{background:#FEE2E2;color:#991B1B}
.p-high{background:#FEF3C7;color:#92400E}
.p-medium{background:#F0FDF4;color:#166534}
.p-low{background:#EFF6FF;color:#1E40AF}
.chip-wrap{position:relative;display:inline-block}
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 8px;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;user-select:none;border:1.5px solid transparent;white-space:nowrap;transition:opacity .1s}
.chip:hover{opacity:.85}
.chip i{font-size:11px}
.s-need{background:#DC2626;color:#fff;border-color:#B91C1C}
.s-ordered{background:#D97706;color:#fff;border-color:#B45309}
.s-received{background:#1D4ED8;color:#fff;border-color:#1E40AF}
.s-installed{background:#15803D;color:#fff;border-color:#166534}
.s-na{background:#111827;color:#fff;border-color:#111827}
.chip-dd{display:none;position:absolute;left:0;top:calc(100% + 3px);z-index:999;background:var(--color-background-primary);border:.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);min-width:140px;overflow:hidden}
.chip-dd.open{display:block}
.chip-opt{display:flex;align-items:center;gap:7px;padding:6px 10px;cursor:pointer;font-size:12px;color:var(--color-text-primary)}
.chip-opt:hover{background:var(--color-background-secondary)}
.sdot{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.dot-need{background:#DC2626}
.dot-ordered{background:#D97706}
.dot-received{background:#1D4ED8}
.dot-installed{background:#15803D}
.dot-na{background:#111827}
.del-btn{font-size:13px;color:var(--color-text-secondary);cursor:pointer;padding:2px 5px;border:none;background:none;border-radius:3px}
.del-btn:hover{color:#DC2626}
.add-row-btn{width:100%;padding:7px;font-size:12px;color:var(--color-text-secondary);background:var(--color-background-secondary);border:none;border-top:.5px solid var(--color-border-tertiary);cursor:pointer;text-align:center}
.add-row-btn:hover{background:var(--color-background-tertiary);color:var(--color-text-primary)}
.spon-tbl{width:100%;border-collapse:collapse;font-size:12px}
.spon-tbl th{padding:7px 8px;text-align:left;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.03em;color:var(--color-text-secondary);border-bottom:.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);white-space:nowrap}
.spon-tbl td{padding:6px 7px;border-bottom:.5px solid var(--color-border-tertiary);vertical-align:middle}
.spon-tbl tr:last-child td{border-bottom:none}
.spon-tbl tr:hover td{background:var(--color-background-secondary)}
.spon-inp{width:100%;padding:3px 5px;font-size:12px;border:.5px solid var(--color-border-secondary);border-radius:4px;background:var(--color-background-primary);color:var(--color-text-primary)}
.spon-inp:focus{outline:none;border-color:#8B6914}
.spon-sel{font-size:11px;padding:3px 4px;border:.5px solid var(--color-border-secondary);border-radius:4px;background:var(--color-background-primary);color:var(--color-text-primary)}
.dec-tbl{width:100%;border-collapse:collapse;font-size:12px}
.dec-tbl th{padding:7px 8px;text-align:left;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.03em;color:var(--color-text-secondary);border-bottom:.5px solid var(--color-border-tertiary);background:var(--color-background-secondary)}
.dec-tbl td{padding:6px 7px;border-bottom:.5px solid var(--color-border-tertiary);vertical-align:top}
.dec-tbl tr:last-child td{border-bottom:none}
.dec-tbl tr:hover td{background:var(--color-background-secondary)}
.dec-inp{width:100%;padding:3px 5px;font-size:12px;border:.5px solid var(--color-border-secondary);border-radius:4px;background:var(--color-background-primary);color:var(--color-text-primary)}
.dec-inp:focus{outline:none;border-color:#8B6914}
.status-legend{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:.75rem;align-items:center}
.leg-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--color-text-secondary)}
.leg-dot{width:8px;height:8px;border-radius:2px}
.tbl-card{background:var(--color-background-primary);border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;margin-bottom:10px}

@media(max-width:600px){
  .top-bar h1{font-size:14px}
  .stat-grid{grid-template-columns:1fr 1fr}
  .stat .val{font-size:15px}
  .ss-grid{grid-template-columns:1fr 1fr}
  .section-hdr{gap:5px}
  .section-title{font-size:13px}
  .parts-table th,.parts-table td{padding:4px 5px;font-size:11px}
  .chip{font-size:10px;padding:3px 6px}
  .cost-inp{width:68px;font-size:11px}
  .tab{font-size:12px;padding:5px 9px}
  .spon-tbl,.dec-tbl{font-size:11px}
  .spon-tbl th,.dec-tbl th,.spon-tbl td,.dec-tbl td{padding:4px 5px}
}


/* ===== Rogue visual UI upgrade, autosave-safe ===== */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Oswald:wght@500;600;700&display=swap');
:root{
  --gs-bg:#0b0b0c;
  --gs-panel:#141416;
  --gs-panel-2:#1d1c1a;
  --gs-card:#201d16;
  --gs-gold:#c59b35;
  --gs-gold-2:#f0cd73;
  --gs-text:#f7f3ea;
  --gs-muted:#b8afa0;
  --gs-line:rgba(240,205,115,.24);
  --gs-danger:#dc2626;
  --gs-blue:#2563eb;
  --gs-green:#16a34a;
  --gs-orange:#d97706;
}
body{font-family:'Inter',system-ui,-apple-system,Segoe UI,sans-serif;background:radial-gradient(circle at 15% 0%,rgba(197,155,53,.18),transparent 34%),linear-gradient(135deg,var(--gs-bg),#111 55%,#0b0b0c);color:var(--gs-text)}
.tracker{max-width:1320px;margin:0 auto;padding:18px;border-radius:24px;background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.02));border:1px solid rgba(240,205,115,.18);box-shadow:0 24px 80px rgba(0,0,0,.34)}
.top-bar{position:relative;overflow:hidden;align-items:center;gap:14px;padding:22px;margin-bottom:18px;border:1px solid var(--gs-line);border-radius:22px;background:linear-gradient(135deg,rgba(197,155,53,.2),rgba(255,255,255,.04)),linear-gradient(180deg,#181512,#0f0f10)}
.top-bar:before{content:'GOLD STANDARD';position:absolute;right:18px;bottom:-10px;font-family:'Oswald',Impact,sans-serif;font-size:76px;font-weight:700;letter-spacing:.06em;color:rgba(240,205,115,.07);pointer-events:none;line-height:.85}
.top-bar h1{position:relative;z-index:1;font-family:'Oswald',Impact,sans-serif;font-size:clamp(30px,5vw,54px);font-weight:700;line-height:.95;letter-spacing:.02em;text-transform:uppercase;color:var(--gs-text);text-shadow:0 2px 18px rgba(0,0,0,.45)}
.top-bar h1 i{color:var(--gs-gold-2)!important;font-size:.7em!important;vertical-align:middle}
.save-indicator,.dl-btn{position:relative;z-index:1;border-radius:999px!important;border:1px solid rgba(240,205,115,.3)!important;background:rgba(0,0,0,.4)!important;color:var(--gs-text)!important;box-shadow:inset 0 1px 0 rgba(255,255,255,.08);font-weight:800;letter-spacing:.02em;text-transform:uppercase}
.save-indicator{padding:9px 13px!important;font-size:11px!important}
.save-indicator.saved{border-color:rgba(22,163,74,.75)!important;color:#86efac!important}.save-indicator.saving{border-color:rgba(217,119,6,.75)!important;color:#fdba74!important}
.dl-btn{padding:10px 16px!important;font-size:12px!important}.dl-btn:hover{transform:translateY(-1px);background:rgba(197,155,53,.18)!important}
.tabs{display:grid;grid-template-columns:repeat(4,minmax(130px,1fr));gap:10px;margin-bottom:18px;overflow:visible}
.tab{position:relative;display:flex;align-items:center;justify-content:center;min-height:58px;padding:14px 18px!important;border-radius:18px!important;border:1px solid rgba(240,205,115,.22)!important;background:linear-gradient(180deg,rgba(255,255,255,.065),rgba(255,255,255,.025))!important;color:var(--gs-text)!important;font-family:'Oswald',Impact,sans-serif!important;font-size:20px!important;font-weight:700!important;letter-spacing:.035em;text-transform:uppercase;box-shadow:0 10px 26px rgba(0,0,0,.2);transition:transform .16s,box-shadow .16s,border-color .16s,background .16s}
.tab:hover{transform:translateY(-2px);border-color:rgba(240,205,115,.6)!important;background:linear-gradient(180deg,rgba(197,155,53,.2),rgba(255,255,255,.045))!important}.tab.active{background:linear-gradient(135deg,#8b6914,#c59b35 52%,#f0cd73)!important;color:#111!important;border-color:#f0cd73!important;box-shadow:0 16px 40px rgba(197,155,53,.28)}
.panel{animation:gsIn .22s ease-out}@keyframes gsIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.stat-grid{grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px}.stat{position:relative;overflow:hidden;padding:18px 18px!important;border-radius:20px!important;background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.025))!important;border:1px solid rgba(240,205,115,.16);box-shadow:0 14px 32px rgba(0,0,0,.16)}.stat:after{content:'';position:absolute;inset:auto 0 0 0;height:3px;background:linear-gradient(90deg,transparent,var(--gs-gold),transparent)}.stat label{font-size:11px!important;font-weight:900!important;letter-spacing:.11em!important;text-transform:uppercase!important;color:var(--gs-muted)!important}.stat .val{font-family:'Oswald',Impact,sans-serif!important;font-size:clamp(24px,3vw,34px)!important;font-weight:700!important;letter-spacing:.015em;color:var(--gs-text)!important}.stat .val.gold,.ss-spent{color:var(--gs-gold-2)!important}.stat .val.green{color:#86efac!important}.stat .val.muted{font-size:24px!important;color:var(--gs-text)!important}

/* ===== Gold Standard 38 header + palette refresh, local-storage safe ===== */
:root{
  --gs-black:#070707;
  --gs-charcoal:#11100f;
  --gs-charcoal-2:#1a1814;
  --gs-gold:#b98a27;
  --gs-gold-light:#f1d17a;
  --gs-gold-dark:#6f4f12;
  --gs-chrome:#d8d8d6;
  --gs-chrome-dark:#7e8284;
  --gs-cream:#f5f0e7;
  --gs-muted:#b9b0a0;
  --gs-border:rgba(241,209,122,.24);
}
body{
  background:
    radial-gradient(circle at 20% -10%,rgba(185,138,39,.22),transparent 38%),
    radial-gradient(circle at 90% 10%,rgba(216,216,214,.08),transparent 26%),
    linear-gradient(135deg,#050505 0%,#11100f 52%,#070707 100%)!important;
  color:var(--gs-cream)!important;
}
.tracker{
  background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.018))!important;
  border:1px solid rgba(241,209,122,.18)!important;
  box-shadow:0 26px 80px rgba(0,0,0,.42), inset 0 1px 0 rgba(255,255,255,.055)!important;
}
.top-bar{
  min-height:154px!important;
  display:flex!important;
  align-items:center!important;
  gap:20px!important;
  padding:22px 26px!important;
  border:1px solid var(--gs-border)!important;
  border-radius:24px!important;
  background:
    linear-gradient(135deg,rgba(185,138,39,.18),rgba(216,216,214,.045)),
    linear-gradient(180deg,#1a1711,#0a0a0a)!important;
}
.top-bar:before{
  content:'BUILD TRACKER'!important;
  right:28px!important;
  bottom:-6px!important;
  color:rgba(241,209,122,.055)!important;
  letter-spacing:.075em!important;
}
.gs-brand-heading{
  position:relative;
  z-index:1;
  flex:1 1 auto;
  min-width:260px;
  display:flex!important;
  align-items:center!important;
  gap:22px!important;
  margin:0!important;
  color:var(--gs-cream)!important;
}
.gs-header-logo{
  display:block;
  width:clamp(260px,42vw,620px);
  max-height:110px;
  object-fit:contain;
  filter:drop-shadow(0 10px 20px rgba(0,0,0,.55));
}
.gs-tracker-title{
  font-family:'Oswald',Impact,'Arial Narrow',sans-serif!important;
  font-size:clamp(24px,3.4vw,50px)!important;
  line-height:.92!important;
  letter-spacing:.035em!important;
  text-transform:uppercase!important;
  color:var(--gs-cream)!important;
  text-shadow:0 2px 18px rgba(0,0,0,.55);
  white-space:nowrap;
}
.save-indicator,.dl-btn{
  border-color:rgba(241,209,122,.38)!important;
  background:linear-gradient(180deg,rgba(0,0,0,.62),rgba(0,0,0,.32))!important;
  color:var(--gs-cream)!important;
}
.tabs .tab{
  border-color:rgba(241,209,122,.24)!important;
  background:linear-gradient(180deg,rgba(216,216,214,.09),rgba(255,255,255,.025))!important;
  color:var(--gs-cream)!important;
}
.tabs .tab.active{
  background:linear-gradient(135deg,var(--gs-gold-dark),var(--gs-gold) 52%,var(--gs-gold-light))!important;
  color:#080808!important;
  border-color:var(--gs-gold-light)!important;
}
.stat,.ss-card,.section-card,.tbl-card{
  border-color:rgba(241,209,122,.18)!important;
}
.stat .val.gold,.ss-card .ss-spent{
  color:var(--gs-gold-light)!important;
}
.big-bar-fill,.prog-fill,.ss-prog-fill{
  background:linear-gradient(90deg,var(--gs-gold-dark),var(--gs-gold),var(--gs-gold-light))!important;
}
.section-title:before{
  color:var(--gs-gold-light)!important;
}
.parts-table th,.spon-tbl th,.dec-tbl th{
  color:var(--gs-muted)!important;
}
@media(max-width:860px){
  .top-bar{min-height:auto!important;align-items:flex-start!important}
  .gs-brand-heading{flex-direction:column!important;align-items:flex-start!important;gap:12px!important}
  .gs-header-logo{width:min(100%,520px);max-height:90px}
  .gs-tracker-title{white-space:normal}
}
@media(max-width:480px){
  .gs-header-logo{max-height:72px}
  .gs-tracker-title{font-size:28px!important}
}



/* ===== Mobile reliability patch ===== */
html{-webkit-text-size-adjust:100%;touch-action:manipulation;}
button,.tab,.section-hdr,.chip,.chip-opt,.ss-card{touch-action:manipulation;-webkit-tap-highlight-color:rgba(240,205,115,.22);}
.tabs,.tab{position:relative;z-index:20;pointer-events:auto;}
.panel.active{display:block!important;}
#panel-parts.active .section-grid{display:grid!important;}
.gs-brand-heading,.gs-brand-heading img{pointer-events:none;}
@media(max-width:760px){
  body{min-width:0!important;overflow-x:hidden;}
  .tracker{width:100%!important;max-width:none!important;margin:0!important;}
  .tabs{display:grid!important;grid-template-columns:1fr 1fr!important;gap:10px!important;overflow:visible!important;}
  .tab{width:100%!important;min-height:54px!important;pointer-events:auto!important;}
  .section-grid{display:grid!important;grid-template-columns:1fr!important;}
  .section-card{display:block!important;}
  .tbl-wrap{overflow-x:auto!important;-webkit-overflow-scrolling:touch!important;}
  .parts-table,.spon-tbl,.dec-tbl{min-width:980px!important;}
}
@media(max-width:430px){.tabs{grid-template-columns:1fr!important;}}


/* ===== v22 requested tweaks only: no circle, clean centered plus/minus controls ===== */
.section-title{
  position:relative!important;
  padding-left:70px!important;
  display:flex!important;
  align-items:center!important;
  min-height:52px!important;
}
.section-title:before{
  content:none!important;
  display:none!important;
}
.section-title:after{
  content:'+'!important;
  position:absolute!important;
  left:18px!important;
  top:50%!important;
  transform:translateY(-56%)!important;
  color:var(--gs-gold-light)!important;
  font-family:'Inter',system-ui,sans-serif!important;
  font-size:43px!important;
  font-weight:900!important;
  line-height:1!important;
  text-align:center!important;
  width:42px!important;
  height:42px!important;
  pointer-events:none!important;
  text-shadow:0 2px 8px rgba(0,0,0,.45);
}
.section-card.open .section-title:after{
  content:'−'!important;
  top:50%!important;
  transform:translateY(-60%)!important;
}
.section-card .sec-chev{display:none!important;}
@media(max-width:860px){
  .top-bar{align-items:center!important;text-align:center!important;}
  .gs-brand-heading{align-items:center!important;text-align:center!important;width:100%!important;min-width:0!important;}
  .gs-header-logo{margin-left:auto!important;margin-right:auto!important;}
  .gs-tracker-title{display:block!important;width:100%!important;text-align:center!important;}
}

</style>

function cloneDefaultData(x){ return JSON.parse(JSON.stringify(x)); }

function hasUsableSections(arr){
  return Array.isArray(arr) && arr.length >= 5 && arr.some(s => s && Array.isArray(s.parts) && s.parts.length > 0);
}

function repairSections(savedSections){
  const defaults = cloneDefaultData(DEFAULT_SECTIONS);
  if(!hasUsableSections(savedSections)) return defaults;
  const savedByKey = new Map(savedSections.filter(Boolean).map(s => [s.key, s]));
  const repaired = defaults.map(defSec => {
    const savedSec = savedByKey.get(defSec.key) || {};
    const mergedSec = Object.assign({}, defSec, savedSec);
    const savedParts = Array.isArray(savedSec.parts) ? savedSec.parts : [];
    if(savedParts.length === 0){ mergedSec.parts = defSec.parts; return mergedSec; }
    const savedPartsById = new Map(savedParts.filter(Boolean).map(p => [p.id, p]));
    const used = new Set();
    const mergedParts = defSec.parts.map(defPart => {
      const savedPart = savedPartsById.get(defPart.id);
      if(savedPart) used.add(defPart.id);
      return Object.assign({}, defPart, savedPart || {});
    });
    savedParts.forEach(p => { if(p && p.id && !used.has(p.id)) mergedParts.push(p); });
    mergedSec.parts = mergedParts;
    return mergedSec;
  });
  savedSections.forEach(sec => { if(sec && sec.key && !defaults.some(d => d.key === sec.key)) repaired.push(sec); });
  return repaired;
}

function repairSponsors(savedSponsors){ return Array.isArray(savedSponsors) && savedSponsors.length ? savedSponsors : cloneDefaultData(DEFAULT_SPONSORS); }
function repairDecisions(savedDecisions){ return Array.isArray(savedDecisions) && savedDecisions.length ? savedDecisions : cloneDefaultData(DEFAULT_DECISIONS); }
function repairTrackerState(){ sections = repairSections(sections); sponsors = repairSponsors(sponsors); decisions = repairDecisions(decisions); }


async function initData(){
  let loaded=false;

  try{
    const local=localStorage.getItem(SAVE_KEY);
    if(local){
      const d=JSON.parse(local);
      sections=d.sections||JSON.parse(JSON.stringify(DEFAULT_SECTIONS));
      sponsors=d.sponsors||JSON.parse(JSON.stringify(DEFAULT_SPONSORS));
      decisions=d.decisions||JSON.parse(JSON.stringify(DEFAULT_DECISIONS));
      loaded=true;
    }
  }catch(e){}

  if(!loaded){
    try{
      const r=window.storage ? await window.storage.get(SAVE_KEY) : null;
      if(r&&r.value){
        const d=JSON.parse(r.value);
        sections=d.sections||JSON.parse(JSON.stringify(DEFAULT_SECTIONS));
        sponsors=d.sponsors||JSON.parse(JSON.stringify(DEFAULT_SPONSORS));
        decisions=d.decisions||JSON.parse(JSON.stringify(DEFAULT_DECISIONS));
        loaded=true;
      }
    }catch(e){}
  }

  if(loaded){
      setSaveInd('saved','Data loaded');
      setTimeout(()=>setSaveInd('idle','Auto-save on'),1500);
  }

  if(!loaded){
    sections=JSON.parse(JSON.stringify(DEFAULT_SECTIONS));
    sponsors=JSON.parse(JSON.stringify(DEFAULT_SPONSORS));
    decisions=JSON.parse(JSON.stringify(DEFAULT_DECISIONS));
  }
  repairTrackerState();
  build();
}

function setSaveInd(state,txt){
  const el=document.getElementById('save-ind');
  if(!el)return;
  el.className='save-indicator'+(state==='saving'?' saving':state==='saved'?' saved':'');
  const icon=state==='saving'?'ti-loader-2':state==='saved'?'ti-cloud-check':'ti-cloud-check';
  el.innerHTML=`<i class="ti ${icon}" aria-hidden="true" style="font-size:12px;margin-right:3px"></i>${txt}`;
}

function scheduleSave(){
  setSaveInd('saving','Saving...');
  clearTimeout(saveTimer);
  saveTimer=setTimeout(doSave,600);
}

async function doSave(){
  try{
    const data=JSON.stringify({sections,sponsors,decisions});

    try{
      localStorage.setItem(SAVE_KEY,data);
    }catch(e){}

    try{
      if(window.storage){
        await window.storage.set(SAVE_KEY,data);
      }
    }catch(e){}

    setSaveInd('saved','Saved');
    setTimeout(()=>setSaveInd('idle','Auto-save on'),1800);
  }catch(e){
    setSaveInd('idle','Auto-save on');
  }
}

function fmtCAD(n){return'$'+parseFloat(n||0).toLocaleString('en-CA',{minimumFractionDigits:2,maximumFractionDigits:2})}
function secActual(s){return s.parts.reduce((t,p)=>t+(parseFloat(p.actual)||0),0)}
function secSponsored(s){return s.parts.reduce((t,p)=>t+(parseFloat(p.sponsored)||0),0)}
function totalActual(){return TRUCK_COST+sections.reduce((t,s)=>t+secActual(s),0)}
function totalSponsored(){return sections.reduce((t,s)=>t+secSponsored(s),0)}
function totalNet(){return totalActual()-totalSponsored()}
function totalBudget(){return sections.reduce((t,s)=>t+(parseFloat(s.budget)||0),0)}
function countStatus(st){let n=0;sections.forEach(s=>s.parts.forEach(p=>{if(p.status===st)n++}));return n}
function totalItems(){return sections.reduce((t,s)=>t+s.parts.length,0)}
function pcls(p){return{Critical:'p-critical',High:'p-high',Medium:'p-medium',Low:'p-low'}[p]||'p-low'}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function updateDashboard(){
  const net=totalNet(),tBudget=totalBudget(),pct=Math.min(100,Math.round((net/TARGET_BUDGET)*100));
  document.getElementById('dash-stats').innerHTML=`
    <div class="stat"><label>Target budget</label><div class="val gold">${fmtCAD(TARGET_BUDGET)}</div></div>
    <div class="stat"><label>Section budgets</label><div class="val muted">${fmtCAD(tBudget)}</div></div>
    <div class="stat"><label>Total spent</label><div class="val">${fmtCAD(totalActual())}</div></div>
    <div class="stat"><label>Sponsored</label><div class="val green">${fmtCAD(totalSponsored())}</div></div>
    <div class="stat"><label>Net spent</label><div class="val">${fmtCAD(net)}<div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div></div></div>
    <div class="stat"><label>Remaining</label><div class="val muted">${fmtCAD(Math.max(0,TARGET_BUDGET-net))}</div></div>
    <div class="stat"><label>Ordered</label><div class="val muted">${countStatus('Ordered')} / ${totalItems()}</div></div>
    <div class="stat"><label>Installed</label><div class="val muted">${countStatus('Installed')}</div></div>
  `;
  document.getElementById('budget-pct').textContent=pct+'%';
  document.getElementById('budget-bar').style.width=pct+'%';
  document.getElementById('bl-spent').textContent='Net: '+fmtCAD(net);
  document.getElementById('bl-target').textContent='Target: '+fmtCAD(TARGET_BUDGET);
  const g=document.getElementById('ss-grid');g.innerHTML='';
  sections.forEach(sec=>{
    const a=secActual(sec),p2=sec.budget>0?Math.min(100,Math.round((a/sec.budget)*100)):0;
    const c=document.createElement('div');c.className='ss-card';
    c.innerHTML=`<div class="ss-name">${sec.name}</div><div class="ss-row"><span class="ss-spent">${fmtCAD(a)}</span><span class="ss-blbl">/ ${fmtCAD(sec.budget)}</span></div><div class="ss-prog"><div class="ss-prog-fill" style="width:${p2}%"></div></div>`;
    c.onclick=()=>{showPanel('parts');setTimeout(()=>{const el=document.getElementById('sec-'+sec.key);if(el){el.scrollIntoView({behavior:'smooth'});const b=document.getElementById('body-'+sec.key),ch=el.querySelector('.sec-chev');if(!b.classList.contains('open')){b.classList.add('open');el.classList.add('open');if(ch)ch.classList.add('open')}}},50)};
    g.appendChild(c);
  });
}

function buildChip(secKey,partId,status){
  const cfg=SC[status]||SC['Need to Buy'];
  return`<div class="chip-wrap" id="cw-${partId}"><div class="chip ${cfg.cls}" onclick="toggleChip('${partId}','${secKey}',event)"><i class="ti ${cfg.icon}" aria-hidden="true"></i>${status}</div><div class="chip-dd" id="cd-${partId}">${SK.map(s=>`<div class="chip-opt" onclick="pickStatus('${secKey}','${partId}','${s}',event)"><div class="sdot ${SC[s].dot}"></div>${s}</div>`).join('')}</div></div>`;
}

function toggleChip(pid,sk,e){
  e.stopPropagation();
  const dd=document.getElementById('cd-'+pid),wasOpen=dd.classList.contains('open');
  document.querySelectorAll('.chip-dd.open').forEach(d=>d.classList.remove('open'));
  if(!wasOpen)dd.classList.add('open');
}

function pickStatus(sk,pid,ns,e){
  e.stopPropagation();
  const sec=sections.find(s=>s.key===sk);if(!sec)return;
  const p=sec.parts.find(x=>x.id===pid);if(!p)return;
  p.status=ns;
  const cw=document.getElementById('cw-'+pid);
  if(cw){const cfg=SC[ns];cw.innerHTML=`<div class="chip ${cfg.cls}" onclick="toggleChip('${pid}','${sk}',event)"><i class="ti ${cfg.icon}" aria-hidden="true"></i>${ns}</div><div class="chip-dd" id="cd-${pid}">${SK.map(s=>`<div class="chip-opt" onclick="pickStatus('${sk}','${pid}','${s}',event)"><div class="sdot ${SC[s].dot}"></div>${s}</div>`).join('')}</div>`;}
  updateSecHeader(sec);updateDashboard();scheduleSave();
}

document.addEventListener('click',()=>document.querySelectorAll('.chip-dd.open').forEach(d=>d.classList.remove('open')));

function buildSection(sec){
  const container=document.getElementById('parts-sections');
  const card=document.createElement('div');card.className='section-card';card.id='sec-'+sec.key;
  const a=secActual(sec),sp=secSponsored(sec);
  card.innerHTML=`
    <div class="section-hdr" onclick="toggleSec('${sec.key}')">
      <div class="section-title">${sec.name}</div>
      <div class="budget-edit-wrap" onclick="event.stopPropagation()">
        <span style="font-size:10px;color:var(--color-text-secondary)">Budget:</span>
        <input class="budget-inp" type="number" step="100" min="0" value="${sec.budget}" onchange="updateSecBudget('${sec.key}',this.value)" id="bi-${sec.key}"/>
      </div>
      <span class="section-meta" id="sm-a-${sec.key}">spent: ${fmtCAD(a)}</span>
      <span class="section-meta" id="sm-c-${sec.key}">${sec.parts.length} parts</span>
      <i class="ti ti-chevron-down sec-chev" aria-hidden="true"></i>
    </div>
    <div class="sec-body" id="body-${sec.key}">
      <div class="tbl-wrap">
        <table class="parts-table">
          <thead><tr>
            <th style="min-width:160px">Part</th><th>Priority</th><th style="min-width:90px">Vendor</th>
            <th>Budget</th><th>Actual</th><th>Sponsored</th><th>Net</th>
            <th>Status</th><th>Link</th><th style="min-width:110px">Notes</th><th></th>
          </tr></thead>
          <tbody id="tb-${sec.key}"></tbody>
        </table>
      </div>
      <button class="add-row-btn" onclick="addPart('${sec.key}')"><i class="ti ti-plus" aria-hidden="true"></i> Add part</button>
    </div>`;
  container.appendChild(card);
  renderRows(sec);
}

function renderRows(sec){
  const tb=document.getElementById('tb-'+sec.key);tb.innerHTML='';
  sec.parts.forEach(p=>{
    const net=(parseFloat(p.actual)||0)-(parseFloat(p.sponsored)||0);
    const tr=document.createElement('tr');tr.id='r-'+p.id;
    const linkCell=p.link
      ?`<a href="${esc(p.link)}" style="font-size:13px;color:#8B6914;padding:2px 4px" target="_blank" title="${esc(p.link)}"><i class="ti ti-external-link" aria-hidden="true"></i></a><button class="del-btn" onclick="clearLink('${sec.key}','${p.id}')" style="font-size:11px"><i class="ti ti-x" aria-hidden="true"></i></button>`
      :`<input class="link-inp" type="url" value="" placeholder="Paste URL..." onchange="updatePart('${sec.key}','${p.id}','link',this.value)"/>`;
    tr.innerHTML=`
      <td><input class="inline-edit" value="${esc(p.name)}" onchange="updatePart('${sec.key}','${p.id}','name',this.value)" style="min-width:150px"/></td>
      <td><span class="p-badge ${pcls(p.priority)}">${p.priority||'—'}</span></td>
      <td><input class="vendor-inp" value="${esc(p.vendor||'')}" onchange="updatePart('${sec.key}','${p.id}','vendor',this.value)"/></td>
      <td style="color:var(--color-text-secondary);font-size:11px;white-space:nowrap">${p.budget>0?fmtCAD(p.budget):'—'}</td>
      <td><input class="cost-inp" type="number" step="0.01" min="0" value="${p.actual||''}" placeholder="0.00" onchange="updatePart('${sec.key}','${p.id}','actual',this.value)"/></td>
      <td><input class="cost-inp" type="number" step="0.01" min="0" value="${p.sponsored||''}" placeholder="0.00" onchange="updatePart('${sec.key}','${p.id}','sponsored',this.value)"/></td>
      <td style="font-size:11px;font-weight:500;white-space:nowrap;color:${net>0?'#8B6914':'var(--color-text-secondary)'}">${net>0?fmtCAD(net):'—'}</td>
      <td>${buildChip(sec.key,p.id,p.status)}</td>
      <td>${linkCell}</td>
      <td><input class="note-inp" value="${esc(p.notes||'')}" placeholder="Notes..." onchange="updatePart('${sec.key}','${p.id}','notes',this.value)"/></td>
      <td><button class="del-btn" onclick="delPart('${sec.key}','${p.id}')"><i class="ti ti-trash" aria-hidden="true"></i></button></td>`;
    tb.appendChild(tr);
  });
}

function clearLink(sk,pid){const sec=sections.find(s=>s.key===sk);if(!sec)return;const p=sec.parts.find(x=>x.id===pid);if(!p)return;p.link='';renderRows(sec);scheduleSave();}
function toggleSec(k){const card=document.getElementById('sec-'+k);if(!card)return;const b=document.getElementById('body-'+k),c=card.querySelector('.sec-chev');if(!b)return;const isOpen=b.classList.toggle('open');card.classList.toggle('open',isOpen);if(c)c.classList.toggle('open',isOpen);}
function updateSecBudget(k,v){const sec=sections.find(s=>s.key===k);if(!sec)return;sec.budget=parseFloat(v)||0;updateSecHeader(sec);updateDashboard();scheduleSave();}
function updateSecHeader(sec){
  const a=secActual(sec);
  const ea=document.getElementById('sm-a-'+sec.key),ec=document.getElementById('sm-c-'+sec.key),bi=document.getElementById('bi-'+sec.key);
  if(ea)ea.textContent='spent: '+fmtCAD(a);
  if(ec)ec.textContent=sec.parts.length+' parts';
  if(bi)bi.value=sec.budget;
}
function updatePart(sk,pid,field,val){
  const sec=sections.find(s=>s.key===sk);if(!sec)return;
  const p=sec.parts.find(x=>x.id===pid);if(!p)return;
  if(field==='actual'||field==='sponsored'){p[field]=parseFloat(val)||0;renderRows(sec);updateSecHeader(sec);updateDashboard();}
  else if(field==='link'){p[field]=val;renderRows(sec);}
  else{p[field]=val;}
  scheduleSave();
}
function addPart(sk){
  const sec=sections.find(s=>s.key===sk);if(!sec)return;
  const id='cx-'+(++partCtr);
  sec.parts.push({id,name:'New part',priority:'Medium',vendor:'TBD',budget:0,actual:0,sponsored:0,status:'Need to Buy',link:'',notes:''});
  renderRows(sec);updateSecHeader(sec);updateDashboard();scheduleSave();
  const tb=document.getElementById('tb-'+sk);const lr=tb.lastElementChild;
  if(lr){const i=lr.querySelector('.inline-edit');if(i){i.focus();i.select();}}
}
function delPart(sk,pid){
  const sec=sections.find(s=>s.key===sk);if(!sec)return;
  sec.parts=sec.parts.filter(p=>p.id!==pid);
  renderRows(sec);updateSecHeader(sec);updateDashboard();scheduleSave();
}

function updateSponStats(){
  const conf=sponsors.filter(s=>s.status==='Confirmed').reduce((t,s)=>t+(parseFloat(s.confirmed)||0),0);
  const pipe=sponsors.reduce((t,s)=>t+(parseFloat(s.retail)||0),0);
  const rcvd=sponsors.filter(s=>s.received).reduce((t,s)=>t+(parseFloat(s.confirmed)||0),0);
  document.getElementById('spon-stats').innerHTML=`
    <div class="stat"><label>Pipeline retail</label><div class="val gold">${fmtCAD(pipe)}</div></div>
    <div class="stat"><label>Confirmed value</label><div class="val green">${fmtCAD(conf)}</div></div>
    <div class="stat"><label>Received value</label><div class="val">${fmtCAD(rcvd)}</div></div>
    <div class="stat"><label>Sponsors</label><div class="val muted">${sponsors.length}</div></div>`;
}

function buildSponRow(s){
  const tr=document.createElement('tr');tr.id='sr-'+s.id;
  tr.innerHTML=`
    <td><input class="spon-inp" value="${esc(s.company)}" onchange="updSpon('${s.id}','company',this.value)" style="min-width:90px"/></td>
    <td><input class="spon-inp" value="${esc(s.product)}" onchange="updSpon('${s.id}','product',this.value)" style="min-width:100px"/></td>
    <td><input class="spon-inp" value="${esc(s.ask)}" onchange="updSpon('${s.id}','ask',this.value)" style="min-width:110px"/></td>
    <td><input class="spon-inp cost-inp" type="number" step="0.01" value="${s.retail||''}" placeholder="0" onchange="updSpon('${s.id}','retail',this.value)" style="width:75px"/></td>
    <td><input class="spon-inp cost-inp" type="number" step="0.01" value="${s.offered||''}" placeholder="0" onchange="updSpon('${s.id}','offered',this.value)" style="width:75px"/></td>
    <td><input class="spon-inp cost-inp" type="number" step="0.01" value="${s.confirmed||''}" placeholder="0" onchange="updSpon('${s.id}','confirmed',this.value)" style="width:75px"/></td>
    <td><select class="spon-sel" onchange="updSpon('${s.id}','status',this.value)">${['Planned','Outreach','Negotiating','Confirmed','Declined'].map(st=>`<option value="${st}"${s.status===st?' selected':''}>${st}</option>`).join('')}</select></td>
    <td><input class="spon-inp" value="${esc(s.contact)}" onchange="updSpon('${s.id}','contact',this.value)" style="min-width:80px"/></td>
    <td><input class="spon-inp" type="date" value="${esc(s.followup)}" onchange="updSpon('${s.id}','followup',this.value)"/></td>
    <td style="text-align:center"><input type="checkbox" ${s.received?'checked':''} onchange="updSpon('${s.id}','received',this.checked)" style="cursor:pointer;width:15px;height:15px"/></td>
    <td><input class="spon-inp" value="${esc(s.notes)}" onchange="updSpon('${s.id}','notes',this.value)" style="min-width:130px"/></td>
    <td><button class="del-btn" onclick="delSpon('${s.id}')"><i class="ti ti-trash" aria-hidden="true"></i></button></td>`;
  return tr;
}
function updSpon(id,f,v){
  const s=sponsors.find(x=>x.id===id);if(!s)return;
  if(['retail','offered','confirmed'].includes(f)){s[f]=parseFloat(v)||0;}
  else if(f==='received'){s[f]=v;}
  else{s[f]=v;}
  updateSponStats();scheduleSave();
}
function addSponsor(){
  const id='sp-'+(++sponsorCtr);
  const s={id,company:'',product:'',ask:'',retail:0,offered:0,confirmed:0,status:'Planned',contact:'',followup:'',received:false,notes:''};
  sponsors.push(s);
  const tb=document.getElementById('spon-tbody'),row=buildSponRow(s);tb.appendChild(row);
  const i=row.querySelector('input');if(i)i.focus();
  updateSponStats();scheduleSave();
}
function delSpon(id){
  sponsors=sponsors.filter(s=>s.id!==id);
  const r=document.getElementById('sr-'+id);if(r)r.remove();
  updateSponStats();scheduleSave();
}

function buildDecRow(d){
  const tr=document.createElement('tr');tr.id='dr-'+d.id;
  tr.innerHTML=`
    <td><input class="dec-inp" value="${esc(d.decision)}" onchange="updDec('${d.id}','decision',this.value)" style="min-width:120px;font-weight:500"/></td>
    <td><input class="dec-inp" value="${esc(d.options)}" onchange="updDec('${d.id}','options',this.value)" style="min-width:150px"/></td>
    <td><input class="dec-inp" value="${esc(d.matters)}" onchange="updDec('${d.id}','matters',this.value)" style="min-width:150px"/></td>
    <td><input class="dec-inp" value="${esc(d.lean)}" onchange="updDec('${d.id}','lean',this.value)" style="min-width:100px;color:#8B6914;font-weight:500"/></td>
    <td><input class="dec-inp" value="${esc(d.owner)}" onchange="updDec('${d.id}','owner',this.value)" style="min-width:55px"/></td>
    <td><select class="spon-sel" onchange="updDec('${d.id}','status',this.value)">${['Open','In Progress','Decided','On Hold'].map(st=>`<option value="${st}"${d.status===st?' selected':''}>${st}</option>`).join('')}</select></td>
    <td><button class="del-btn" onclick="delDec('${d.id}')"><i class="ti ti-trash" aria-hidden="true"></i></button></td>`;
  return tr;
}
function updDec(id,f,v){const d=decisions.find(x=>x.id===id);if(d){d[f]=v;scheduleSave();}}
function addDecision(){
  const id='dc-'+(++decCtr);
  const d={id,decision:'',options:'',matters:'',lean:'',owner:'Lee',status:'Open'};
  decisions.push(d);
  const tb=document.getElementById('dec-tbody'),row=buildDecRow(d);tb.appendChild(row);
  const i=row.querySelector('input');if(i)i.focus();
  scheduleSave();
}
function delDec(id){
  decisions=decisions.filter(d=>d.id!==id);
  const r=document.getElementById('dr-'+id);if(r)r.remove();
  scheduleSave();
}

function showPanel(name){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  const idx={dashboard:0,parts:1,sponsorships:2,decisions:3}[name];
  const tabs=document.querySelectorAll('.tab');
  if(tabs[idx])tabs[idx].classList.add('active');
}

function build(){
  repairTrackerState();
  const ps=document.getElementById('parts-sections');
  if(ps) ps.innerHTML='';
  sections.forEach(sec=>buildSection(sec));
  updateDashboard();
  const stb=document.getElementById('spon-tbody');
  if(stb){stb.innerHTML=''; sponsors.forEach(s=>stb.appendChild(buildSponRow(s)));}
  updateSponStats();
  const dtb=document.getElementById('dec-tbody');
  if(dtb){dtb.innerHTML=''; decisions.forEach(d=>dtb.appendChild(buildDecRow(d)));}
}


function mobileSafeShowPanel(name){
  if(typeof showPanel === 'function') showPanel(name);
  if(!document.querySelector('.section-card')) build();
}

function bindMobileSafeClicks(){
  document.querySelectorAll('.tab[data-panel]').forEach(btn=>{
    const panel=btn.getAttribute('data-panel');
    btn.addEventListener('click',function(e){e.preventDefault(); e.stopPropagation(); mobileSafeShowPanel(panel);},{passive:false});
    btn.addEventListener('touchend',function(e){e.preventDefault(); e.stopPropagation(); mobileSafeShowPanel(panel);},{passive:false});
  });
  document.addEventListener('click',function(e){
    const tab=e.target.closest && e.target.closest('.tab[data-panel]');
    if(tab){e.preventDefault(); mobileSafeShowPanel(tab.getAttribute('data-panel'));}
  },true);
}

let trackerBooted=false;
function bootTracker(){
  if(trackerBooted) return;
  trackerBooted=true;
  Object.assign(window,{showPanel,toggleSec,toggleChip,pickStatus,updatePart,updateSecBudget,addPart,delPart,clearLink,updSpon,addSponsor,delSpon,updDec,addDecision,delDec,build,initData});
  bindMobileSafeClicks();
  initData();
  setTimeout(()=>{ if(!document.querySelector('.section-card')) { repairTrackerState(); build(); } },250);
}

if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',bootTracker);
}else{
  bootTracker();
}
window.addEventListener('pageshow',()=>setTimeout(()=>{ if(!document.querySelector('.section-card')) { repairTrackerState(); build(); } },250));

</script>
